name: Update Jakarta Weather

on:
  schedule:
    - cron: '0 0 * * *'    # 07:00 WIB
    - cron: '0 1 * * *'    # 08:00 WIB
    - cron: '0 3 * * *'    # 10:00 WIB
    - cron: '0 5 * * *'    # 12:00 WIB
    - cron: '0 6 * * *'    # 13:00 WIB
    - cron: '0 7 * * *'    # 14:00 WIB
    - cron: '0 9 * * *'    # 16:00 WIB
    - cron: '0 11 * * *'   # 18:00 WIB
    - cron: '0 13 * * *'   # 20:00 WIB
    - cron: '0 15 * * *'   # 22:00 WIB
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Random skip (variasi commit 1-10/hari)
        id: random_check
        run: |
          ROLL=$((RANDOM % 10))
          echo "Roll: $ROLL"
          if [ "$ROLL" -eq 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Fetch weather data
        if: steps.random_check.outputs.skip == 'false'
        run: |
          curl -s "https://api.openweathermap.org/data/2.5/weather?q=Jakarta,ID&appid=${{ secrets.OWM_API_KEY }}&units=metric" -o weather.json

      - name: Fetch air quality data
        if: steps.random_check.outputs.skip == 'false'
        run: |
          curl -s "https://api.openweathermap.org/data/2.5/air_pollution?lat=-6.2088&lon=106.8456&appid=${{ secrets.OWM_API_KEY }}" -o air.json

      - name: Save snapshot to history
        if: steps.random_check.outputs.skip == 'false'
        run: |
          TIMESTAMP=$(TZ='Asia/Jakarta' date +'%Y-%m-%d_%H%M')
          mkdir -p history
          cp weather.json history/${TIMESTAMP}_weather.json
          cp air.json history/${TIMESTAMP}_air.json

      - name: Generate SVG card
        if: steps.random_check.outputs.skip == 'false'
        run: python3 generate_card.py

      - name: Generate README
        if: steps.random_check.outputs.skip == 'false'
        run: python3 generate_readme.py

      - name: Commit and push
        if: steps.random_check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weather.json air.json card.svg README.md history/
          git diff --staged --quiet || git commit -m "chore: update Jakarta weather $(TZ='Asia/Jakarta' date +'%Y-%m-%d %H:%M') WIB"
          git push
